name: Build and Push Docker Image

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name in lowercase (e.g. owner/repo)'
        required: true
        type: string
      dockerhub-username:
        description: 'Docker Hub username'
        required: true
        type: string
    outputs:
      image-tag:
        description: 'Full Docker image reference with SHA tag'
        value: ${{ jobs.docker.outputs.image-tag }}
    secrets:
      DOCKERHUB_TOKEN:
        description: 'Docker Hub access token'
        required: true

jobs:
  docker:
    name: Build and Push
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ inputs.dockerhub-username }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Generate image tag
        id: image-tag
        run: echo "tag=${{ inputs.image-name }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ inputs.image-name }}:${{ github.sha }}
            ${{ inputs.image-name }}:latest
