name: Deploy to Railway

on:
  workflow_call:
    inputs:
      image-tag:
        description: 'Full Docker image reference to deploy (e.g. ghcr.io/owner/repo:sha)'
        required: true
        type: string
      environment:
        description: 'Deployment environment'
        required: false
        type: string
        default: 'production'
    secrets:
      RAILWAY_TOKEN:
        description: 'Railway API token for deployment'
        required: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}

    steps:
      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --image ${{ inputs.image-tag }} --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
