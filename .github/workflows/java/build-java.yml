name: Java Build and Test

on:
  workflow_call:
    inputs:
      java-version:
        required: false
        type: string
        default: '17'
      skip-tests:
        required: false
        type: boolean
        default: false
    outputs:
      artifact-name:
        description: "Nombre del artefacto generado"
        value: ${{ jobs.build-and-test.outputs.artifact-name }}

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.set-artifact.outputs.artifact-name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build with Maven
        run: mvn clean package ${{ inputs.skip-tests && '-DskipTests' || '' }}

      - name: Run unit tests
        if: ${{ !inputs.skip-tests }}
        run: mvn test

      - name: Run integration tests
        if: ${{ !inputs.skip-tests }}
        run: mvn verify -P integration-tests

      - name: Set artifact name
        id: set-artifact
        run: echo "artifact-name=app-${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ github.sha }}
          path: target/*.jar
          retention-days: 1