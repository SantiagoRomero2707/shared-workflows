name: Build and Test with MySQL In Java Projects

on:
  workflow_call:
    inputs:
      java-version:
        description: 'Java version to use'
        required: false
        type: string
        default: '17'
      mysql-database:
        description: 'Nombre de la base de datos de prueba'
        required: true
        type: string
      mysql-user:
        description: 'Usuario de MySQL para los tests'
        required: true
        type: string
    secrets:
      MYSQL_ROOT_PASSWORD:
        description: 'Contraseña del usuario root de MySQL'
        required: true
      MYSQL_PASSWORD:
        description: 'Contraseña del usuario de MySQL'
        required: true

jobs:
  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: mvn test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ inputs.mysql-database }}
          MYSQL_USER: ${{ inputs.mysql-user }}
          MYSQL_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: ${{ inputs.java-version }}
          distribution: 'temurin'
          cache: maven

      - name: Run integration tests
        run: mvn verify -P integration-tests -Dsurefire.skip=true
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://localhost:3306/${{ inputs.mysql-database }}
          SPRING_DATASOURCE_USERNAME: ${{ inputs.mysql-user }}
          SPRING_DATASOURCE_PASSWORD: ${{ secrets.MYSQL_PASSWORD }}
